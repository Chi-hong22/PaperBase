# PaperBase 配置文件

project:
  name: "PaperBase"
  version: "0.1.0"

# 路径配置
paths:
  library: "library"    # 论文库目录
  registry: "registry"  # 数据库索引目录
  graph: "graph"        # 知识图谱目录
  skills: "skills"      # Skills 目录

# 存储配置
storage:
  pdf_content_addressed: true  # PDF 使用内容寻址存储
  sha256_sharding: true        # 使用 SHA256 分片

# 状态机配置
state_machine:
  initial_state: "discovered"  # 初始状态
  final_state: "ready"         # 最终状态

# === LLM 配置（可选） ===
# 仅用于传递给 graphify 工具的环境变量配置
# PaperBase 核心功能（摄入、转换、检索）不依赖 LLM
# 如果不使用 graphify，可以跳过此配置
#
# 注意：以下字段已废弃，不再使用：
#   - llm.enabled: PaperBase 不再内置 LLM 调用逻辑
#   - llm.provider: 统一使用 OpenAI-compatible API 格式
llm:
  # OpenAI-compatible API 端点
  # graphify 会通过 OPENAI_BASE_URL 环境变量读取
  base_url: ${PAPERBASE_LLM_BASE_URL}

  # API 密钥
  # graphify 会通过 OPENAI_API_KEY 环境变量读取
  api_key: ${PAPERBASE_LLM_API_KEY}

  # 模型名称
  # 示例: gpt-4o-mini, gpt-4o, claude-3-5-sonnet-20241022
  model: ${PAPERBASE_LLM_MODEL}

# === 知识图谱配置 ===
graph:
  # 自动更新策略
  # 选项: never / on_ingest / on_entity_change / always
  # - never: 从不自动更新，需要手动执行
  # - on_ingest: 新论文摄入时更新
  # - on_entity_change: 论文关键信息变化时更新（推荐）
  # - always: 任何变化都更新
  auto_update: on_entity_change

  # 可选: 高级配置
  advanced:
    mode: incremental        # 更新模式: incremental (增量) / full (全量)
    process_timeout: null      # PaperBase 外层进程超时；null 表示不限制批处理总时长
    api_timeout: 600            # Graphify 单次 LLM 请求超时（秒）
    ignore_patterns:         # 忽略的文件模式
      - "sources/"
      - "registry/"
      - "**/source/"
      - "**/*.pdf"

# === Adapter 配置 ===
adapters:
  # Paper Fetch Adapter（在线论文获取）
  paper_fetch:
    enabled: true

    # 获取质量等级
    # 选项: minimal / standard / high
    # - minimal: 仅元数据（标题、作者、年份）
    # - standard: 元数据 + 摘要
    # - high: 全文 + 引用 + 资源（推荐）
    quality: high

    # 可选: 自定义配置（覆盖 quality 自动推导）
    # advanced:
    #   artifact_mode: "markdown-assets"
    #   asset_profile: "body"
    #   include_refs: "all"
    #   max_tokens: "full_text"

  # Zotero Adapter  # 预留接口
  zotero:
    enabled: true
    local_mode: true  # 本地模式

  # ScanSci Adapter  # 预留接口
  scansci:
    enabled: true
    scihub_enabled: false
    require_authorized_access: true

# 术语库配置
terminology:
  fuzzy_matching: true     # 是否启用模糊匹配
  custom_aliases: []       # 自定义别名
